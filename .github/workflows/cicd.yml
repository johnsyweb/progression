name: CI/CD

on:
  pull_request:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Cache dist
        uses: actions/cache/save@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'src/**', 'vite.config.ts') }}

  lint-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        id: dist-cache
        with:
          path: dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'src/**', 'vite.config.ts') }}

      - name: Build if cache miss
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test:run

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        id: dist-cache
        with:
          path: dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'src/**', 'vite.config.ts') }}

      - name: Build if cache miss
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Install Chromium for Lighthouse
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Lighthouse
        run: pnpm run lighthouse
        env:
          BASE_URL: /${{ github.event.repository.name }}/

  screenshot:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore dist cache
        uses: actions/cache/restore@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        id: dist-cache
        with:
          path: dist
          key: build-${{ hashFiles('**/pnpm-lock.yaml', 'src/**', 'vite.config.ts') }}

      - name: Build if cache miss
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate screenshot and report drift
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: |
          pnpm exec vite preview --port 4173 --strictPort --host localhost &
          preview_pid=$!
          sleep 8
          pnpm run generate:screenshot
          kill "$preview_pid" 2>/dev/null || true
          wait "$preview_pid" 2>/dev/null || true

          if ! git diff --exit-code assets/screenshot.png; then
            echo "::warning::README screenshot changed. Run 'pnpm run generate:screenshot' locally and commit assets/screenshot.png."
          fi

  build-for-deploy:
    runs-on: ubuntu-latest
    needs: [build, lint-test, lighthouse, screenshot]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-for-deploy
    if: success()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
