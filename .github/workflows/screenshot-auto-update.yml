name: Screenshot Auto Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshot-update:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    env:
      PREVIEW_PORT: "4174"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate screenshot
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: |
          pnpm run preview -- --port "$PREVIEW_PORT" --strictPort &
          sleep 8
          pnpm run generate:screenshot

      - name: Create screenshot update PR
        id: cpr
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(assets): update screenshot"
          title: "chore(assets): update screenshot"
          body: |
            Automated screenshot refresh generated by CI.
          branch: chore/screenshot-auto-update
          delete-branch: true
          add-paths: |
            assets/screenshot.png

      - name: Enable auto-merge for screenshot PR
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" --repo "${{ github.repository }}"
